<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>Profile — CrowMint</title><link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="../account.css"></head>
<body class="account-page" data-account-page="profile">
<header class="site-header account-site-header"><a class="brand" href="/"><span class="brand-icon"><img src="../assets/crowmint-icon.png" alt=""></span><span>CrowMint</span></a><nav class="account-nav" aria-label="Account navigation"><a class="header-link" href="/purchases/">Purchases</a><a class="header-link" href="/orders/">Order History</a></nav></header>
<main class="account-main"><a class="account-back-link" href="/">← Back to Shopping</a><div class="account-heading"><div><span class="eyebrow">Your account</span><h1>Profile</h1><p>Your CrowMint account details.</p></div></div>
<section class="account-panel"><div class="profile-list"><div><span>Name</span><div class="profile-name-row"><strong id="profileName">Loading…</strong><button class="profile-edit-button" id="editProfileName" type="button" aria-label="Edit profile name"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 20 4.2-1 10.6-10.6a2 2 0 0 0-2.8-2.8L5.4 16.2 4 20Z"/><path d="m14.5 7.1 2.8 2.8"/></svg></button></div><form class="profile-name-form" id="profileNameForm" hidden><input id="profileNameInput" name="fullName" maxlength="80" autocomplete="name" required><div><button class="primary-button" type="submit">Save</button><button class="secondary-button" id="cancelProfileName" type="button">Cancel</button></div></form></div><div><span>Email</span><strong id="profileEmail">Loading…</strong></div></div><div class="profile-actions"><button class="secondary-button" id="changePasswordButton" type="button">Change Password</button><button class="secondary-button" id="logoutButton" type="button">Logout</button></div><form class="profile-password-form" id="profilePasswordForm" hidden><label>New Password<input id="newPasswordInput" name="newPassword" type="password" minlength="6" autocomplete="new-password" required></label><label>Confirm New Password<input id="confirmPasswordInput" name="confirmPassword" type="password" minlength="6" autocomplete="new-password" required></label><div><button class="primary-button" type="submit">Save Password</button><button class="secondary-button" id="cancelPasswordChange" type="button">Cancel</button></div></form><p class="account-message" id="accountMessage" hidden></p></section></main>
<script src="../config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../account.js"></script></body></html>
