<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="shortcut icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/assets/favicon.png">
  <title>Login — CrowMint</title><link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="../account.css"></head>
<body class="account-page" data-account-page="login"><header class="site-header"><a class="brand" href="/"><span class="brand-icon"><img src="../assets/crowmint-icon.png" alt=""></span><span>CrowMint</span></a></header><main class="account-main"><section class="auth-card"><span class="eyebrow">Welcome back</span><h1>Login</h1><p>Access your profile, purchases, and order history.</p><button class="secondary-button google-button" id="googleAuth" type="button">Continue with Google</button><div class="auth-divider">or</div><form class="auth-form" id="loginForm"><label>Email<input name="email" type="email" autocomplete="email" required></label><label>Password<input name="password" type="password" autocomplete="current-password" required></label><button class="primary-button wide" type="submit">Login</button></form><div class="auth-links"><a href="#" id="forgotPassword">Forgot Password?</a><a href="/signup/">Create account</a></div><section id="resetPanel" hidden><div class="auth-divider">set a new password</div><form class="auth-form" id="resetForm"><label>New Password<input name="newPassword" type="password" minlength="8" required></label><button class="primary-button wide" type="submit">Update Password</button></form></section><p class="account-message" id="accountMessage" hidden></p></section></main><script src="../config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../account.js"></script></body></html>
