<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex"><title>Signup — CrowMint</title><link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="../account.css"></head>
<body class="account-page" data-account-page="signup"><header class="site-header"><a class="brand" href="/"><span class="brand-icon"><img src="../assets/crowmint-icon.png" alt=""></span><span>CrowMint</span></a></header><main class="account-main"><section class="auth-card"><span class="eyebrow">Create account</span><h1>Join CrowMint</h1><p>Keep your digital products together and download them anytime.</p><button class="secondary-button google-button" id="googleAuth" type="button">Continue with Google</button><div class="auth-divider">or</div><form class="auth-form" id="signupForm"><label>Full Name<input name="fullName" autocomplete="name" required></label><label>Email<input name="email" type="email" autocomplete="email" required></label><label>Password<input name="password" type="password" autocomplete="new-password" minlength="8" required></label><button class="primary-button wide" type="submit">Create Account</button></form><p class="account-message" id="accountMessage" hidden></p><div class="auth-links"><span>Already registered?</span><a href="/login/">Login</a></div></section></main><script src="../config.js"></script><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../account.js"></script></body></html>
